<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Concepta – Intake: Gathering Data from Requestor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Inter",sans-serif;background:#eceae6;padding:28px 24px 60px}
.header{margin-bottom:14px}
.h-title{font-size:13.5px;font-weight:700;color:#111}
.h-sub{font-size:11px;color:#6b7280;margin:3px 0 8px}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid}
.tr{background:#fef2f2;color:#991b1b;border-color:#fca5a5}
.tb{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
.card{background:#fff;border:1px solid #d1cfc8;border-radius:9px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.legend{display:flex;gap:18px;padding:9px 16px;border-bottom:1px solid #e8e6df;background:#fafaf7;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:5px;font-size:8.5px;color:#6b7280}
.lb{width:11px;height:11px;border-radius:2px}
.scroll{overflow-x:auto;overflow-y:hidden;cursor:grab}
.scroll:active{cursor:grabbing}
</style>
</head>
<body>
<div class="header">
  <div class="h-title">Request Type: New feature / function request</div>
  <div class="h-sub">Workflow · Intake Process — Gathering Data from Requestor</div>
  <div class="tags">
    <span class="tag tr">New Feature</span>
    <span class="tag tb">Slack</span>
    <span class="tag tb">Notion</span>
    <span class="tag tb">Zoho Sprints</span>
    <span class="tag tb">Basecamp</span>
    <span class="tag tb">Smartsheet</span>
  </div>
</div>

<div class="card">
  <div class="legend">
    <div class="li"><div class="lb" style="background:#fff;border:1.5px solid #111"></div>Process step</div>
    <div class="li"><div class="lb" style="background:#fef2f2;border:1.5px solid #dc2626"></div>Flagged / conditional</div>
    <div class="li"><div class="lb" style="background:#fff;border:1.5px solid #111;transform:rotate(45deg);width:10px;height:10px"></div>&nbsp;&nbsp;Decision</div>
    <div class="li"><div style="width:22px;height:0;border-top:1.5px dashed #dc2626"></div>Loop / feedback</div>
    <div class="li"><div style="width:10px;height:10px;border-radius:50%;background:#fef2f2;border:1.5px solid #dc2626"></div>Role requirement</div>
  </div>

  <div class="scroll" id="sw">
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="780"
     style="display:block;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M1 1.5L8 5L1 8.5" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ahr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M1 1.5L8 5L1 8.5" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ahg" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M1 1.5L8 5L1 8.5" fill="none" stroke="#166534" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ═══════════════════════════════════
     LANE BACKGROUNDS
═══════════════════════════════════ -->
<!-- Requestor y=0–220 -->
<rect x="0" y="0" width="2200" height="220" fill="#f0f6ff"/>
<rect x="0" y="0" width="2200" height="220" fill="none" stroke="#cdd5e0" stroke-width="1"/>
<!-- AI Agent y=220–500 -->
<rect x="0" y="220" width="2200" height="280" fill="#f6f3ff"/>
<rect x="0" y="220" width="2200" height="280" fill="none" stroke="#cdd5e0" stroke-width="1"/>
<!-- Internal Team y=500–780 -->
<rect x="0" y="500" width="2200" height="280" fill="#f0faf3"/>
<rect x="0" y="500" width="2200" height="280" fill="none" stroke="#cdd5e0" stroke-width="1"/>

<!-- Lane label columns -->
<rect x="0" y="0"   width="44" height="220" fill="#e8f0fb" stroke="#cdd5e0" stroke-width="1"/>
<rect x="0" y="220" width="44" height="280" fill="#ede9fa" stroke="#cdd5e0" stroke-width="1"/>
<rect x="0" y="500" width="44" height="280" fill="#e6f5ec" stroke="#cdd5e0" stroke-width="1"/>
<text transform="rotate(-90,22,110)" x="22" y="110" font-size="9.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">REQUESTOR</text>
<text transform="rotate(-90,22,360)" x="22" y="360" font-size="9.5" font-weight="700" fill="#6d28d9" text-anchor="middle">AI AGENT</text>
<text transform="rotate(-90,22,640)" x="22" y="640" font-size="9.5" font-weight="700" fill="#166534" text-anchor="middle">INTERNAL TEAM — PDM · SA · Dev · QA · UX/UI</text>

<!-- ═══════════════════════════════════
     CROSS-LANE TRIGGER LINES
═══════════════════════════════════ -->
<!-- AI trigger line at y=219 -->
<line x1="440" y1="219" x2="1950" y2="219" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="8,5" opacity=".6"/>
<rect x="442" y="207" width="64" height="14" rx="2" fill="#fef2f2"/>
<text x="474" y="217" font-size="7.5" font-weight="600" fill="#dc2626" text-anchor="middle">AI trigger</text>

<!-- Internal Team trigger line at y=499 -->
<line x1="900" y1="499" x2="1950" y2="499" stroke="#166534" stroke-width="1.5" stroke-dasharray="8,5" opacity=".5"/>
<rect x="902" y="487" width="90" height="14" rx="2" fill="#e6f5ec"/>
<text x="947" y="497" font-size="7.5" font-weight="600" fill="#166534" text-anchor="middle">Internal Team picks up</text>

<!-- ═══════════════════════════════════
     REQUESTOR LANE
═══════════════════════════════════ -->

<!-- START -->
<ellipse cx="80" cy="110" rx="28" ry="16" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="80" y="114" font-size="9.5" font-weight="700" fill="#111" text-anchor="middle">START</text>
<line x1="108" y1="110" x2="126" y2="110" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Step 1 -->
<rect x="128" y="82" width="130" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="193" y="99" font-size="7" font-weight="700" fill="#9ca3af" text-anchor="middle">STEP 1</text>
<text x="193" y="112" font-size="8.5" fill="#111" text-anchor="middle">Submit new feature /</text>
<text x="193" y="124" font-size="8.5" fill="#111" text-anchor="middle">function request</text>
<text x="193" y="136" font-size="8" fill="#6b7280" text-anchor="middle">(Basecamp / Email)</text>
<line x1="258" y1="110" x2="276" y2="110" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Conditioned badge -->
<rect x="278" y="80" width="72" height="14" rx="3" fill="#f5f4f1" stroke="#d1cfc8" stroke-width="1"/>
<text x="314" y="90" font-size="8" font-weight="600" fill="#6b7280" text-anchor="middle">Conditioned</text>

<!-- Conditional note -->
<rect x="278" y="96" width="164" height="56" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="290" y="112" font-size="8.5" font-weight="700" fill="#dc2626">Note:</text>
<text x="290" y="125" font-size="8.5" fill="#111">If submitted via chatbot —</text>
<text x="290" y="138" font-size="8.5" fill="#111">AI steps may be skipped;</text>
<text x="290" y="148" font-size="8" fill="#dc2626">PDM/PM handles manually</text>
<line x1="442" y1="110" x2="460" y2="110" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Provide additional info (loop target) -->
<rect x="462" y="60" width="64" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="494" y="70" font-size="7.5" font-weight="600" fill="#dc2626" text-anchor="middle">↩ Loop 1</text>
<rect x="462" y="76" width="64" height="14" rx="3" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="494" y="86" font-size="7.5" font-weight="600" fill="#dc2626" text-anchor="middle">↩ Loop 2</text>

<rect x="462" y="92" width="130" height="56" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="527" y="109" font-size="8.5" font-weight="700" fill="#dc2626" text-anchor="middle">Provide additional</text>
<text x="527" y="122" font-size="8.5" font-weight="700" fill="#dc2626" text-anchor="middle">information</text>
<text x="527" y="137" font-size="7.5" fill="#991b1b" text-anchor="middle">Triggered by either loop</text>
<line x1="592" y1="120" x2="612" y2="120" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Resubmit -->
<rect x="614" y="92" width="110" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="669" y="113" font-size="8.5" fill="#111" text-anchor="middle">Resubmit</text>
<text x="669" y="126" font-size="8.5" fill="#111" text-anchor="middle">request</text>

<!-- ═══════════════════════════════════
     AI AGENT LANE
═══════════════════════════════════ -->

<!-- Requires SLA callout -->
<rect x="54" y="286" width="126" height="52" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="117" y="304" font-size="8.5" font-weight="700" fill="#dc2626" text-anchor="middle">Requires</text>
<text x="117" y="317" font-size="8.5" font-weight="700" fill="#dc2626" text-anchor="middle">SLA response</text>
<text x="117" y="330" font-size="8.5" font-weight="700" fill="#dc2626" text-anchor="middle">definitions</text>

<!-- Send confirmation -->
<rect x="192" y="276" width="132" height="58" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="258" y="294" font-size="8.5" fill="#111" text-anchor="middle">Send confirmation</text>
<text x="258" y="307" font-size="8.5" fill="#111" text-anchor="middle">to client</text>
<text x="258" y="320" font-size="8.5" fill="#111" text-anchor="middle">Received + pending</text>
<text x="258" y="332" font-size="8" fill="#6b7280" text-anchor="middle">assignment + SLA info</text>
<line x1="324" y1="305" x2="346" y2="305" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Scan submission -->
<rect x="348" y="266" width="140" height="78" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="418" y="283" font-size="8.5" fill="#111" text-anchor="middle">Scan submission for</text>
<text x="418" y="296" font-size="8.5" fill="#111" text-anchor="middle">required fields:</text>
<text x="418" y="309" font-size="8.5" fill="#111" text-anchor="middle">feature name · outcome</text>
<text x="418" y="322" font-size="8.5" fill="#111" text-anchor="middle">urgency · current</text>
<text x="418" y="335" font-size="8" fill="#6b7280" text-anchor="middle">behavior · proposed change</text>
<line x1="488" y1="305" x2="510" y2="305" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Required data present? diamond -->
<polygon points="558,281 610,305 558,329 506,305" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="558" y="301" font-size="7.5" fill="#111" text-anchor="middle">Required data</text>
<text x="558" y="313" font-size="7.5" fill="#111" text-anchor="middle">present?</text>

<!-- Yes → -->
<line x1="610" y1="305" x2="634" y2="305" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="614" y="299" font-size="8" font-weight="700" fill="#166534">Yes</text>

<!-- No ↑ — loop back up to requestor -->
<line x1="558" y1="281" x2="558" y2="244" stroke="#dc2626" stroke-width="1.5" marker-end="url(#ahr)"/>
<text x="562" y="262" font-size="8" font-weight="700" fill="#dc2626">No</text>
<!-- Horizontal run to provide-info box in requestor lane -->
<path d="M558 240 L558 170 L494 170 L494 148" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ahr)"/>
<text x="540" y="182" font-size="7.5" fill="#dc2626">Loop 1</text>

<!-- Zoho prereq -->
<rect x="636" y="248" width="148" height="42" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="710" y="264" font-size="8" font-weight="700" fill="#dc2626" text-anchor="middle">Requires Zoho Sprint Backlog</text>
<text x="710" y="278" font-size="8" fill="#111" text-anchor="middle">Titled: New Request – Analysis/Scope</text>

<!-- Create Zoho ticket -->
<rect x="636" y="290" width="148" height="46" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="710" y="308" font-size="8.5" fill="#111" text-anchor="middle">Create Zoho ticket</text>
<text x="710" y="321" font-size="8.5" fill="#111" text-anchor="middle">in Backlog</text>
<line x1="784" y1="313" x2="806" y2="313" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Basecamp prereq -->
<rect x="808" y="248" width="140" height="30" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="878" y="266" font-size="8" font-weight="700" fill="#dc2626" text-anchor="middle">Requires Basecamp + Board</text>

<!-- Create Basecamp item -->
<rect x="808" y="282" width="140" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="878" y="299" font-size="8.5" fill="#111" text-anchor="middle">Create Basecamp item</text>
<text x="878" y="312" font-size="8.5" fill="#111" text-anchor="middle">→ assign to New</text>
<text x="878" y="325" font-size="8.5" fill="#111" text-anchor="middle">Request column</text>
<line x1="948" y1="310" x2="968" y2="310" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Associate to bucket -->
<rect x="970" y="284" width="120" height="46" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1030" y="302" font-size="8.5" fill="#111" text-anchor="middle">Associate request</text>
<text x="1030" y="315" font-size="8.5" fill="#111" text-anchor="middle">to bucket</text>
<line x1="1090" y1="307" x2="1110" y2="307" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Assign to PDM -->
<rect x="1112" y="284" width="100" height="46" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1162" y="302" font-size="8.5" fill="#111" text-anchor="middle">Assign to</text>
<text x="1162" y="315" font-size="8.5" fill="#111" text-anchor="middle">PDM</text>
<line x1="1212" y1="307" x2="1232" y2="307" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Slack prereq -->
<rect x="1234" y="252" width="128" height="30" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="1298" y="271" font-size="8" font-weight="700" fill="#dc2626" text-anchor="middle">Requires Account Slack Channel</text>

<!-- Notify Slack -->
<rect x="1234" y="284" width="128" height="56" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1298" y="302" font-size="8.5" fill="#111" text-anchor="middle">Notify Slack channel</text>
<text x="1298" y="315" font-size="8.5" fill="#111" text-anchor="middle">+ tag assignee</text>

<!-- Arrow: AI → Internal Team drop -->
<line x1="1298" y1="340" x2="1298" y2="510" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- ═══════════════════════════════════
     INTERNAL TEAM LANE
═══════════════════════════════════ -->

<!-- Prereqs bar -->
<rect x="54" y="514" width="380" height="46" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
<text x="66" y="531" font-size="8.5" font-weight="700" fill="#dc2626" text-decoration="underline">Prerequisites</text>
<text x="66" y="545" font-size="8.5" fill="#111">New Request Processing Budget · Timebased Allocation · Scheduled planning calls with PM · Account SLA definitions</text>

<!-- Review request -->
<rect x="1166" y="512" width="164" height="76" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1248" y="529" font-size="8.5" fill="#111" text-anchor="middle">Review request → move</text>
<text x="1248" y="542" font-size="8.5" fill="#111" text-anchor="middle">to "Analyzing Request"</text>
<text x="1248" y="555" font-size="8.5" fill="#111" text-anchor="middle">column → inform client</text>
<text x="1248" y="568" font-size="8.5" fill="#111" text-anchor="middle">of emerging questions</text>
<line x1="1330" y1="550" x2="1352" y2="550" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Is request clear? diamond -->
<polygon points="1408,526 1462,550 1408,574 1354,550" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1408" y="546" font-size="7.5" fill="#111" text-anchor="middle">Is the request</text>
<text x="1408" y="558" font-size="7.5" fill="#111" text-anchor="middle">clear?</text>

<!-- Yes → -->
<line x1="1462" y1="550" x2="1486" y2="550" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="1466" y="544" font-size="8" font-weight="700" fill="#166534">Yes</text>

<!-- No — loop back -->
<line x1="1408" y1="526" x2="1408" y2="488" stroke="#dc2626" stroke-width="1.5"/>
<path d="M1408 488 L1408 460 L527 460 L527 148" fill="none" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#ahr)"/>
<text x="960" y="453" font-size="7.5" fill="#dc2626" text-anchor="middle">Loop 2 — Routes to Requestor: Provide additional information</text>
<text x="1412" y="506" font-size="8" font-weight="700" fill="#dc2626">No</text>

<!-- Collab with SA -->
<rect x="1488" y="524" width="140" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1558" y="542" font-size="8.5" fill="#111" text-anchor="middle">Collab with SA</text>
<text x="1558" y="555" font-size="8.5" fill="#111" text-anchor="middle">to evaluate request type</text>
<line x1="1628" y1="550" x2="1648" y2="550" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- Categorize -->
<rect x="1650" y="524" width="120" height="52" rx="4" fill="#fff" stroke="#111" stroke-width="1.5"/>
<text x="1710" y="542" font-size="8.5" fill="#111" text-anchor="middle">Categorize</text>
<text x="1710" y="555" font-size="8.5" fill="#111" text-anchor="middle">request type</text>
<line x1="1770" y1="550" x2="1792" y2="550" stroke="#111" stroke-width="1.5" marker-end="url(#ah)"/>

<!-- END -->
<ellipse cx="1832" cy="550" rx="32" ry="18" fill="#14532d" stroke="#14532d" stroke-width="1.5"/>
<text x="1832" y="554" font-size="9.5" font-weight="700" fill="#fff" text-anchor="middle">END</text>

<!-- Tooling note -->
<rect x="54" y="700" width="420" height="30" rx="4" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="66" y="719" font-size="8.5" font-weight="700" fill="#7c2d12">Tooling:</text>
<text x="116" y="719" font-size="8.5" fill="#111">Notion · Mermaid / Lucid · Figma · Smartsheet Project Plan</text>

</svg>
  </div>
</div>

<script>
const el=document.getElementById('sw');
let down=false,sx,sl;
el.addEventListener('mousedown',e=>{down=true;sx=e.pageX;sl=el.scrollLeft;el.style.userSelect='none'});
document.addEventListener('mouseup',()=>{down=false;el.style.userSelect=''});
document.addEventListener('mousemove',e=>{if(!down)return;el.scrollLeft=sl-(e.pageX-sx)});
</script>
</body>
</html>
